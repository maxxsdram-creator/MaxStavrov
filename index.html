<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Максим Пенкин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            min-height: 100vh;
        }

        /* БАННЕР-ОБЛОЖКА */
        .banner {
            width: 100%;
            height: 200px;
            background-image: url('https://sun9-24.userapi.com/impf/LSUcm4GDsDzQa5gVgEasuJFg0q-dRhIpAwTY5w/Ir_iZgFR1hU.jpg?size=1920x768&quality=95&crop=0,0,1584,632&sign=d0581aa784669e503d64c5ef00540dbb&c_uniq_tag=QylABzxvHk8GgF_ERGpsWfKQzqzq9KPLDVWktqFu0pY&type=cover_group');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Блок с фото и именем */
        .profile {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: #1e1e1e;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .bio {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.3px;
        }

        /* Контейнер контента */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Кнопки соцсетей */
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 13px 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.4px;
            transition: all 0.2s ease;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .link-btn:active {
            transform: scale(0.97);
        }

        .link-btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            fill: currentColor;
        }

        /* Заголовок плейлиста */
        .playlist-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Треки */
        .track {
            margin-bottom: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 12px;
        }

        .track-name {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
        }

        .track iframe {
            width: 100%;
            height: 60px;
            min-width: 280px;
            max-width: 100%;
            border: 0;
            border-radius: 6px;
        }

        /* ИКОНКИ ПЛАТФОРМ ПОД ТРЕКОМ */
        .track-platforms {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .track-platform-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .track-platform-icon:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        .track-platform-icon:active {
            transform: scale(0.93);
        }

        .track-platform-icon svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
        }

        /* КОНТАКТЫ */
        .contacts {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
        }

        .contacts-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.9);
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .contact-item:hover {
            color: #ffffff;
        }

        .contact-item svg {
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.5);
            flex-shrink: 0;
        }

        .contact-item:hover svg {
            fill: #ffffff;
        }

        /* ПОДВАЛ */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.5px;
        }

        @media (max-width: 400px) {
            .banner {
                height: 140px;
            }
            .avatar {
                width: 56px;
                height: 56px;
            }
            .name {
                font-size: 18px;
            }
            .container {
                padding: 14px;
            }
            .track-platform-icon {
                width: 34px;
                height: 34px;
                border-radius: 8px;
            }
            .track-platform-icon svg {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
